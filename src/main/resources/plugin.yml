name: tinyThings
version: '${git.commit.id.abbrev}'
main: gg.embers.tinythings.TinyThings
api-version: '1.21'
description: Extensible plugin for custom command-only items (Super Sponge and friends)
authors: [Tiny Embers, Levah]
website: https://embers.gg
softdepend: [Vault, ShopGUIPlus, RoseStacker, FastAsyncWorldEdit, WorldEdit]

commands:
  tinythings:
    description: tinyThings root command
    usage: /tinythings <give|list|make-infinite|reload|help>
    aliases: [tt, tiny]
  size:
    description: Set your (or a player's) scale attribute
    usage: /size [<number>] [<player>]
    permission: embers.size

permissions:
  tinythings.*:
    description: All tinyThings permissions
    default: op
    children:
      tinythings.give: true
      tinythings.list: true
      tinythings.reload: true
      tinythings.make-infinite: true
  tinythings.give:
    description: Give tinyThings items
    default: op
  tinythings.list:
    description: List registered items
    default: op
  tinythings.reload:
    description: Reload the tinyThings config
    default: op
  tinythings.make-infinite:
    description: Turn the held item into an infinite block
    default: op
  tinythings.biomestick.use:
    description: Use the Biome Stick to repaint region biomes
    default: op
  embers.size:
    description: Use /size to set your own scale (0.6 to 3.0)
    default: op
  embers.admin:
    description: Set any size from 0 to 16 and change other players' sizes via /size
    default: op
